# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog

envios_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/envios.csv
  load_args:
    encoding: "utf-8"

incidencias_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/incidencias.csv
  load_args:
    encoding: "utf-8"

rutas_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/rutas.csv
  load_args:
    encoding: "utf-8"

vehiculos_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/vehiculos.csv
  load_args:
    encoding: "utf-8"

# Capa intermediate

envios_inter:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/envios_limpios.parquet

incidencias_inter:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/incidencias_limpias.parquet

rutas_inter:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/rutas_limpias.parquet

vehiculos_inter:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/vehiculos_limpios.parquet

# --- CAPA PRIMARY (Salida Integrada) ---
master_table:
  type: pandas.ParquetDataset
  filepath: data/03_primary/master_table.parquet

# CAPA VALIDATION

reporte_validacion:
  type: json.JSONDataset
  filepath: data/08_reporting/validacion_final.json